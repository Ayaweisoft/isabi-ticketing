events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Detect social media / messaging crawlers that don't run JavaScript.
    # These bots need server-rendered og:image / og:title so previews work
    # in WhatsApp, Facebook, Twitter, Telegram, Slack, etc.
    map $http_user_agent $is_social_bot {
        default                         0;
        ~*(WhatsApp)                    1;
        ~*(facebookexternalhit)         1;
        ~*(Twitterbot)                  1;
        ~*(LinkedInBot)                 1;
        ~*(Slackbot)                    1;
        ~*(TelegramBot)                 1;
        ~*(Discordbot)                  1;
        ~*(Applebot)                    1;
        ~*(Googlebot)                   1;
        ~*(bingbot)                     1;
        ~*(Snapchat)                    1;
        ~*(viber)                       1;
        ~*(Pinterest)                   1;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Event pages — proxy to meta server so crawlers get og:image ──────
        # The meta server checks X-Is-Bot: bots get server-rendered meta HTML,
        # regular users get index.html served from the meta server's memory.
        location ~* ^/ticket/[^/]+/?$ {
            proxy_pass         http://127.0.0.1:3001;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Is-Bot        $is_social_bot;
            proxy_set_header   X-Original-URI  $request_uri;
            proxy_read_timeout 10s;
        }

        # Handle all other client-side routing (React Router)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
