name: Build and Deploy

on:
  pull_request:
    types:
      - closed

jobs:
  # ── Job 1: Build Docker image and push to DockerHub ──────────────────────────
  # Triggers when a PR is MERGED into the `development` branch.
  build-and-push:
    name: Build and push Docker image
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/i-sabi:ticketing
          build-args: |
            VITE_API_PREFIX=https://api.i-sabi.com.ng/api
            VITE_PAYSTACK_PUBLIC_KEY=${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS ──────────────────────────────────────────────────────
  # Triggers when a PR from `development` is MERGED into `main`.
  # Assumes the Docker image was already built and pushed by Job 1 above
  # (i.e. `development` was up-to-date before opening the release PR to `main`).
  deploy:
    name: Deploy to VPS
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'nohup bash /home/isabi/i-sabi-devops/scripts/update-ticketing.sh > /home/isabi/logs/ticketing.log 2>&1 &'
